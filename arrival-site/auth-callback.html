<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in...</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #FFFFF5; color: #2a2622; }
        .msg { text-align: center; }
        p { font-size: 16px; margin: 8px 0; }
        .sub { font-size: 14px; color: #7c736a; }
    </style>
</head>
<body>
    <div class="msg">
        <p>Signing you in...</p>
        <p class="sub">Returning to the app.</p>
    </div>
    <script>
        // Catches OAuth redirect from Supabase and forwards tokens to the app
        var hash = window.location.hash;
        var search = window.location.search;

        if (hash && hash.length > 1) {
            window.location.replace('arrival://auth/callback' + hash);
        } else if (search && search.includes('code=')) {
            window.location.replace('arrival://auth/callback' + search);
        } else {
            document.querySelector('.msg').innerHTML = '<p>Something went wrong.</p><p class="sub">Close this page and try again in the app.</p>';
        }

        setTimeout(function() {
            document.querySelector('.sub').textContent = "If the app didn't open, close this tab and return to Arrival.";
        }, 3000);
    </script>
</body>
</html>
