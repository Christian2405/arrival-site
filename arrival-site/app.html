<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Arrival AI</title>
  <meta name="description" content="Download Arrival AI — Real-Time Guidance for trade workers. iOS and Android.">
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FFFFF5;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      padding: 40px 28px;
    }
    .logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin: 0 auto 24px;
      display: block;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .tagline {
      font-size: 16px;
      color: #555;
      margin-bottom: 32px;
      line-height: 1.4;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 20px;
      background: #1a1a1a;
      color: #FFFFF5;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn svg { width: 22px; height: 22px; }
    .redirecting {
      font-size: 14px;
      color: #888;
      margin-top: 16px;
    }
    .footer {
      margin-top: 32px;
      font-size: 13px;
      color: #999;
    }
    .footer a { color: #555; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo.svg" alt="Arrival AI" class="logo">
    <h1>Get Arrival AI</h1>
    <p class="tagline">Real-Time Guidance for trade workers.<br>See, Reason, Guide.</p>

    <a id="ios-btn" class="btn" href="https://apps.apple.com/app/arrival-ai/id6753011117" style="display:none;">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
      Download on the App Store
    </a>

    <a id="android-btn" class="btn" href="https://play.google.com/store/apps/details?id=com.arrivalcompany.arrival" style="display:none;">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.199l2.807 1.626a1 1 0 0 1 0 1.732l-2.807 1.626L15.302 12l2.396-2.492zM5.864 2.658L16.802 8.99l-2.301 2.302-8.637-8.634z"/></svg>
      Get it on Google Play
    </a>

    <p id="redirect-msg" class="redirecting"></p>

    <div class="footer">
      <a href="/">Back to arrivalcompany.com</a>
    </div>
  </div>

  <script>
    (function() {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      var iosBtn = document.getElementById('ios-btn');
      var androidBtn = document.getElementById('android-btn');
      var msg = document.getElementById('redirect-msg');

      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      var isAndroid = /android/i.test(ua);

      if (isIOS) {
        iosBtn.style.display = 'flex';
        msg.textContent = 'Opening App Store…';
        setTimeout(function() { window.location.href = iosBtn.href; }, 600);
      } else if (isAndroid) {
        androidBtn.style.display = 'flex';
        msg.textContent = 'Opening Google Play…';
        setTimeout(function() { window.location.href = androidBtn.href; }, 600);
      } else {
        // Desktop: show both buttons
        iosBtn.style.display = 'flex';
        androidBtn.style.display = 'flex';
      }
    })();
  </script>
</body>
</html>
