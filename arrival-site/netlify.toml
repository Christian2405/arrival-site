[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

# Clean URLs for Apple App Store requirements
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/delete-account"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/delete-data"
  to = "/index.html"
  status = 200
